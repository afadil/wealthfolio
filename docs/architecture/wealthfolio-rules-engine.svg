<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Inter, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow-rule" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#6a3e80" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Wealthfolio — JS Rules Engine (Phase D.2)</text>
  <text x="600" y="50" text-anchor="middle" font-size="12" fill="#666">Tagged data hydrated into evaluation context · QuickJS runs jurisdiction-specific rule packs · pluggable per-jurisdiction</text>

  <!-- ═══ INPUTS (LEFT COLUMN) ═══ -->
  <text x="170" y="90" text-anchor="middle" font-weight="bold" fill="#2c3e50" font-size="13">Evaluation context</text>
  <text x="170" y="107" text-anchor="middle" fill="#666" font-size="10">(hydrated from tagged data at evaluation time)</text>

  <rect x="60" y="120" width="220" height="68" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="170" y="142" text-anchor="middle" font-weight="bold" fill="#1b5e20">filer</text>
  <text x="170" y="161" text-anchor="middle" fill="#2e7d32" font-size="11">jurisdiction: "US-NY"</text>
  <text x="170" y="177" text-anchor="middle" fill="#555" font-size="10" font-style="italic">from settings (v1) / legal_entities (v2)</text>

  <rect x="60" y="200" width="220" height="82" rx="8" fill="#cfe0f2" stroke="#2e6ba8" stroke-width="1.5"/>
  <text x="170" y="222" text-anchor="middle" font-weight="bold" fill="#2e6ba8">account</text>
  <text x="170" y="241" text-anchor="middle" fill="#2e6ba8" font-size="11">wrapper_kind: "TAXABLE_BROKERAGE"</text>
  <text x="170" y="257" text-anchor="middle" fill="#2e6ba8" font-size="11">jurisdiction: "US"</text>
  <text x="170" y="272" text-anchor="middle" fill="#555" font-size="10" font-style="italic">from accounts row</text>

  <rect x="60" y="294" width="220" height="110" rx="8" fill="#f4edfa" stroke="#8850a0" stroke-width="1.5"/>
  <text x="170" y="316" text-anchor="middle" font-weight="bold" fill="#8850a0">asset</text>
  <text x="170" y="335" text-anchor="middle" fill="#8850a0" font-size="11">tax_class: "BOND_SUBNATIONAL"</text>
  <text x="170" y="351" text-anchor="middle" fill="#8850a0" font-size="11">issuer_jurisdiction: "US"</text>
  <text x="170" y="367" text-anchor="middle" fill="#8850a0" font-size="11">issuer_subdivision: "US-CA"</text>
  <text x="170" y="383" text-anchor="middle" fill="#8850a0" font-size="11">tax_attributes: {}</text>
  <text x="170" y="397" text-anchor="middle" fill="#555" font-size="10" font-style="italic">from assets row</text>

  <rect x="60" y="416" width="220" height="96" rx="8" fill="#fff3e0" stroke="#c56000" stroke-width="1.5"/>
  <text x="170" y="438" text-anchor="middle" font-weight="bold" fill="#c56000">activity</text>
  <text x="170" y="457" text-anchor="middle" fill="#c56000" font-size="11">type: "DIVIDEND"</text>
  <text x="170" y="473" text-anchor="middle" fill="#c56000" font-size="11">income_type: "TAX_EXEMPT_DIV"</text>
  <text x="170" y="489" text-anchor="middle" fill="#c56000" font-size="11">amount: 1250.00</text>
  <text x="170" y="505" text-anchor="middle" fill="#555" font-size="10" font-style="italic">from activities row</text>

  <!-- Arrow from inputs to engine -->
  <path d="M290,316 Q340,316 370,316" fill="none" stroke="#6a3e80" stroke-width="2" marker-end="url(#arrow-rule)"/>
  <text x="330" y="307" text-anchor="middle" fill="#6a3e80" font-size="11" font-weight="bold">hydrate</text>

  <!-- ═══ ENGINE (CENTER) ═══ -->
  <rect x="380" y="120" width="440" height="420" rx="12" fill="#f8f4fc" stroke="#6a3e80" stroke-width="2.2"/>
  <text x="600" y="148" text-anchor="middle" font-weight="bold" fill="#6a3e80" font-size="15">QuickJS Rules Engine</text>
  <text x="600" y="167" text-anchor="middle" fill="#888" font-size="11">embedded JavaScript interpreter — sandboxed, deterministic</text>

  <!-- Rule pack boxes -->
  <rect x="400" y="190" width="400" height="70" rx="6" fill="#fff" stroke="#6a3e80" stroke-width="1.2"/>
  <text x="420" y="210" font-weight="bold" fill="#6a3e80" font-size="12">rule_pack: US (seeded)</text>
  <text x="420" y="229" fill="#555" font-size="10">• BOND_SUBNATIONAL dividends → federal exempt</text>
  <text x="420" y="244" fill="#555" font-size="10">• BOND_SUBNATIONAL state-exempt iff issuer_subdivision == filer state</text>
  <text x="420" y="258" fill="#555" font-size="10">• QUALIFIED_DIV → preferential cap-gains rate  · etc.</text>

  <rect x="400" y="272" width="400" height="50" rx="6" fill="#fff" stroke="#6a3e80" stroke-width="1.2"/>
  <text x="420" y="292" font-weight="bold" fill="#6a3e80" font-size="12">rule_pack: US-NY (seeded)</text>
  <text x="420" y="309" fill="#555" font-size="10">• BOND_SUBNATIONAL state-taxable unless issuer_subdivision == "US-NY"</text>

  <rect x="400" y="334" width="400" height="50" rx="6" fill="#fff" stroke="#6a3e80" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="420" y="354" font-weight="bold" fill="#6a3e80" font-size="12">rule_pack: CH (seeded or user-authored)</text>
  <text x="420" y="371" fill="#555" font-size="10">• CH_3A wrapper → cantonal + federal deferred until withdrawal · etc.</text>

  <!-- Pseudocode snippet -->
  <rect x="400" y="400" width="400" height="128" rx="6" fill="#fff" stroke="#6a3e80" stroke-width="1"/>
  <text x="420" y="420" font-family="Menlo, Consolas, monospace" fill="#6a3e80" font-size="10" font-weight="bold">// US rule pack (excerpt)</text>
  <text x="420" y="436" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">function evaluate(ctx) {</text>
  <text x="420" y="450" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">  if (ctx.account.wrapper_kind === "ROTH_IRA")</text>
  <text x="420" y="464" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">    return { federal: "exempt", state: "exempt" };</text>
  <text x="420" y="478" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">  if (ctx.asset.tax_class === "BOND_SUBNATIONAL")</text>
  <text x="420" y="492" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">    return { federal: "exempt", state:</text>
  <text x="420" y="506" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">      ctx.asset.issuer_subdivision === ctx.filer.state</text>
  <text x="420" y="520" font-family="Menlo, Consolas, monospace" fill="#555" font-size="10">        ? "exempt" : "taxable" };  /* ... */ }</text>

  <!-- Arrow engine → output -->
  <path d="M830,316 Q890,316 925,316" fill="none" stroke="#6a3e80" stroke-width="2" marker-end="url(#arrow-rule)"/>
  <text x="880" y="307" text-anchor="middle" fill="#6a3e80" font-size="11" font-weight="bold">evaluate</text>

  <!-- ═══ OUTPUT (RIGHT COLUMN) ═══ -->
  <text x="1035" y="90" text-anchor="middle" font-weight="bold" fill="#2c3e50" font-size="13">Treatment output</text>
  <text x="1035" y="107" text-anchor="middle" fill="#666" font-size="10">(consumed by tax reports, projections)</text>

  <rect x="935" y="120" width="220" height="305" rx="8" fill="#fff" stroke="#6a3e80" stroke-width="1.8"/>
  <text x="1045" y="144" text-anchor="middle" font-weight="bold" fill="#6a3e80" font-size="13">Treatment</text>
  <line x1="955" y1="154" x2="1135" y2="154" stroke="#6a3e80" stroke-width="0.8"/>

  <text x="955" y="175" fill="#6a3e80" font-size="11" font-weight="bold">federal:</text>
  <rect x="1020" y="163" width="120" height="20" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="1080" y="178" text-anchor="middle" fill="#1b5e20" font-size="11" font-weight="bold">EXEMPT</text>

  <text x="955" y="206" fill="#6a3e80" font-size="11" font-weight="bold">state:</text>
  <rect x="1020" y="194" width="120" height="20" rx="3" fill="#fde8e8" stroke="#d44" stroke-width="1"/>
  <text x="1080" y="209" text-anchor="middle" fill="#a33" font-size="11" font-weight="bold">TAXABLE</text>

  <text x="955" y="237" fill="#6a3e80" font-size="11" font-weight="bold">effective_rate:</text>
  <text x="1080" y="237" text-anchor="middle" fill="#555" font-size="11">(rate table lookup)</text>

  <text x="955" y="266" fill="#6a3e80" font-size="11" font-weight="bold">reasons: [</text>
  <text x="970" y="282" fill="#555" font-size="10">  "US: BOND_SUBNATIONAL → fed exempt",</text>
  <text x="970" y="296" fill="#555" font-size="10">  "US-NY: issuer US-CA ≠ filer US-NY</text>
  <text x="970" y="310" fill="#555" font-size="10">         → state taxable",</text>
  <text x="955" y="326" fill="#6a3e80" font-size="11" font-weight="bold">]</text>

  <text x="955" y="352" fill="#6a3e80" font-size="11" font-weight="bold">foreign_tax_credit:</text>
  <text x="1080" y="352" text-anchor="middle" fill="#555" font-size="11">0.00</text>
  <text x="955" y="370" fill="#888" font-size="10" font-style="italic">(populated when WHT applies)</text>

  <text x="955" y="397" fill="#6a3e80" font-size="11" font-weight="bold">treatment_changes_on:</text>
  <text x="955" y="414" fill="#555" font-size="10" font-style="italic">(e.g. LTCG anniversary, wash-sale expiry)</text>
</svg>

